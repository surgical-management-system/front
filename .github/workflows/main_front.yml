name: Build and deploy Node.js app to Azure Web App - front

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: npm install and build
        run: |
          npm install
          npm run build -- --configuration=production

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # Subimos SOLO el contenido de la carpeta build
          path: dist/dacs-fe/browser 

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # COMENTAMOS ESTO para que el Login de Azure no falle por el "Subject Claim"
    # environment:
    #   name: 'Production' 
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          # Lo descargamos en una carpeta específica para no mezclar
          path: ./node-app
      
      - name: List downloaded artifact
        run: ls -R ./node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FEE7795100C44D6BAB96CB0F44B9FE79 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2EEFF701DA2F4594B468D92C5B6DA65E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_67012B94C3924395A1F8C59DDA0E6580 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'front'
          # Si no usas slots (instancias separadas), borrá esta línea o dejala como 'production'
          # slot-name: 'Production' 
          # IMPORTANTE: Como el artifact YA ES el contenido de /browser, apuntamos a la carpeta raíz
          package: ./node-app